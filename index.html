<!DOCTYPE html>
<html lang=pl>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta http-equiv=X-UA-Compatible content="IE=edge">
<meta name=description content="Edukacyjny projekt inżynierski prezentujący opis i prezentację wybranych wzorów i deseni, takich jak krzywe Beziéra, trójkąt Sierpińskiego, paproć Bransleya czy inne fraktale.">
<meta name=keywords content="krzywa Beziéra,trójkąt Sierpińskiego,fraktale,zbiór Cantora,paproć Bransleya">
<title>Responsywna aplikacja webowa do prezentacji wzorów i deseni</title>
<link rel="shortcut icon" href=favicon.ico>
<link href=1.css rel=stylesheet>
</head>
<body>
<noscript>Aby zaprezentować wzory potrzebna jest włączona obsługa JavaScript</noscript>
<nav><img id=logo src=ANSB.svg alt="Logo szkoły"><h1>Responsywna aplikacja webowa do prezentacji wzorów i deseni</h1></nav>
<aside><ul><li>Krzywa Beziéra</li><li>Trójkąt Sierpińskiego</li></ul></aside>
<main><h2>Trójkąt Sierpińskiego</h2><canvas id=c width=2000px height=1200px></canvas><div id=m><div><label for=kolor>Kolor: # </label><input id=kolor value=f15f04 maxlength=6></div><div><label for=poziom>Poziom (0–9): </label><input id=poziom value=2 maxlength=1></div><div id=mb><button id=l class=mr10>Losuj</button><button id=u>Ustaw</button></div></div></main>
<script src=1.js></script>
</body>
</html>
